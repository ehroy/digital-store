version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digistore-backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads
    environment:
      - DB_PATH=/app/data/digistore.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digistore-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: digistore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro   # mount SSL certs here
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
  uploads_data:
